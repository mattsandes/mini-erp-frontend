<app-header />

<main>
  <section id="customer-list-section">
    <h2>Resumo de cliente</h2>

    <mat-form-field>
      <mat-label>Find customer</mat-label>
      <input matInput (keyup)="applyFilters($event)" placeholder="Ex. Cliente" #input>
    </mat-form-field>

    <table mat-table [dataSource]="dataSource" id="customer-table">

      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>Id</th>
        <td mat-cell *matCellDef="let customer"> {{customer.id}} </td>
      </ng-container>

      <ng-container matColumnDef="customerName">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let customer"> {{customer.customerName}} </td>
      </ng-container>

      <ng-container matColumnDef="cpf">
        <th mat-header-cell *matHeaderCellDef>CPF</th>
        <td mat-cell *matCellDef="let customer"> {{customer.cpf}} </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let customer"> {{customer.email}} </td>
      </ng-container>

      <ng-container matColumnDef="telefone">
        <th mat-header-cell *matHeaderCellDef>Telefone</th>
        <td mat-cell *matCellDef="let customer"> {{customer.telefone}} </td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let customer"> {{customer.type}} </td>
      </ng-container>

      <ng-container matColumnDef="observations">
        <th mat-header-cell *matHeaderCellDef>Observations</th>
        <td mat-cell *matCellDef="let customer"> {{customer.observations}} </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let customer; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" colspan="4">No data matching the filter "{{input.value}}"</td>
      </tr>
    </table>
  </section>
</main>
