<app-header />

<main>
  <section id="create-product-section">

    <h2>Criar produto</h2>

    <form [formGroup]="productForm" (submit)="createProduct()">
      <mat-form-field>
        <mat-label for="productName">Product Name</mat-label>
        <input matInput formControlName="productName"/>
      </mat-form-field>

      <mat-form-field>
        <mat-label for="productCode">Product Code</mat-label>
        <input matInput formControlName="productCode"/>
      </mat-form-field>

      <mat-form-field>
        <mat-label for="price">Product price</mat-label>
        <input matInput type="number" formControlName="price"/>
      </mat-form-field>

      <mat-form-field>
        <mat-label for="description">Product Description</mat-label>
        <input matInput formControlName="description"/>
      </mat-form-field>

      <mat-form-field>
        <mat-label for="d">Unit</mat-label>
        <input matInput formControlName="unit"/>
      </mat-form-field><br>

      <button mat-raised-button>Basic</button>
    </form>
  </section>
</main>
